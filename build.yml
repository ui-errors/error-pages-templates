name: Build Templates Registry

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build templates
        run: node scripts/build.js

      - name: Verify templates.json exists
        run: |
          if [ ! -f templates.json ]; then
            echo "templates.json was not generated"
            exit 1
          fi

      - name: Commit generated files
        run: |
          git config user.name "ui-errors-bot"
          git config user.email "bot@ui-errors.dev"

          git add build templates.json

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "auto: build templates registry"

          git push
